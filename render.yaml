services:
  - type: web
    name: interpres-pptx-filler
    runtime: python
    buildCommand: apt-get install -y libreoffice --no-install-recommends 2>/dev/null || true && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1
    envVars:
      - key: API_TOKEN
        generateValue: false
        value: interpres-secret-2026
    plan: free
