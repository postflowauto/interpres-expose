<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERPRÉS — Exposé Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1b2a; font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: #111e2e; border: 1px solid #2a3a4a; border-radius: 12px; padding: 3rem; max-width: 560px; width: 100%; }
  h1 { color: #C8A96E; font-size: 2rem; letter-spacing: 0.15em; text-align: center; font-weight: 400; margin-bottom: 0.4rem; }
  .sub { color: #8a9ab0; font-size: 0.75rem; letter-spacing: 0.2em; text-align: center; margin-bottom: 2.5rem; font-family: Arial, sans-serif; }
  .desc { color: #7a8a9a; font-size: 0.85rem; line-height: 1.6; margin-bottom: 2rem; font-family: Arial, sans-serif; text-align: center; }
  .drop-zone { border: 2px dashed #2a3a4a; border-radius: 8px; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #C8A96E; background: rgba(200,169,110,0.05); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .drop-text { color: #7a8a9a; font-size: 0.9rem; font-family: Arial, sans-serif; line-height: 1.6; }
  .drop-text strong { color: #C8A96E; }
  .file-list { margin-top: 1rem; max-height: 160px; overflow-y: auto; }
  .file-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: rgba(200,169,110,0.08); border-radius: 4px; margin-bottom: 4px; font-size: 0.8rem; font-family: Arial, sans-serif; color: #C8A96E; }
  .file-size { color: #5a6a7a; font-size: 0.75rem; }
  .btn { width: 100%; padding: 1rem; background: transparent; border: 1px solid #C8A96E; color: #C8A96E; font-family: Arial, sans-serif; font-size: 0.8rem; letter-spacing: 0.15em; cursor: pointer; border-radius: 4px; margin-top: 1.5rem; transition: all 0.2s; }
  .btn:hover:not(:disabled) { background: rgba(200,169,110,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { margin-top: 1.5rem; padding: 1.2rem; border-radius: 8px; font-family: Arial, sans-serif; font-size: 0.85rem; display: none; line-height: 1.6; }
  .status.loading { background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.2); color: #C8A96E; display: block; }
  .status.success { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.3); color: #27ae60; display: block; }
  .status.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; display: block; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(200,169,110,0.3); border-top-color: #C8A96E; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress { margin-top: 8px; font-size: 0.8rem; color: #8a9ab0; }
  .download-btn { display: block; width: 100%; padding: 1rem; background: #C8A96E; color: #0d1b2a; font-family: Arial, sans-serif; font-size: 0.8rem; letter-spacing: 0.15em; text-align: center; text-decoration: none; border-radius: 4px; margin-top: 1rem; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <h1>INTERPRÉS</h1>
  <div class="sub">EXPOSÉ GENERATOR</div>
  <p class="desc">Lade den gesamten Projektdatenraum hoch — alle Häuser als ZIP-Dateien. Claude analysiert automatisch alle Unterlagen und erstellt das Exposé.</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".zip" multiple>
    <div class="drop-icon">📁</div>
    <div class="drop-text">
      <strong>ZIPs hier ablegen</strong><br>
      oder klicken zum Auswählen<br>
      <span style="font-size:0.8rem; margin-top:4px; display:block; color:#5a6a7a;">Mehrere ZIPs gleichzeitig möglich (Haus A, B, C...)</span>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <button class="btn" id="generateBtn" disabled>EXPOSÉ GENERIEREN</button>
  <div class="status" id="status"></div>
</div>

<script>
const BASE_URL    = '';  // Gleicher Server — relative URLs
const RENDER_URL  = '/generate-expose';
const CHUNK_URL   = '/upload-chunk';
const API_TOKEN   = 'interpres-secret-2026';
const CHUNK_SIZE  = 80 * 1024 * 1024; // 80 MB — sicher unter Render's 100 MB Proxy-Limit

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileList   = document.getElementById('fileList');
const generateBtn = document.getElementById('generateBtn');
const status     = document.getElementById('status');
let selectedFiles = [];

function formatSize(bytes) {
  return bytes > 1048576 ? (bytes/1048576).toFixed(1) + ' MB' : (bytes/1024).toFixed(0) + ' KB';
}

function setStatus(type, html) {
  status.className = 'status ' + type;
  status.innerHTML = html;
}

function updateFileList() {
  fileList.innerHTML = '';
  selectedFiles.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<span>📦 ${f.name}</span><span class="file-size">${formatSize(f.size)}</span>`;
    fileList.appendChild(div);
  });
  generateBtn.disabled = selectedFiles.length === 0;
}

fileInput.addEventListener('change', e => {
  selectedFiles = Array.from(e.target.files).filter(f => f.name.endsWith('.zip'));
  updateFileList();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.zip'));
  updateFileList();
});

// Datei in Chunks hochladen → gibt session_id zurück
async function uploadFileChunked(file, fileIndex, totalFiles) {
  const sessionId = crypto.randomUUID();
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const end   = Math.min(start + CHUNK_SIZE, file.size);
    const chunk = file.slice(start, end);

    const fd = new FormData();
    fd.append('chunk', chunk, file.name);
    fd.append('session_id', sessionId);
    fd.append('chunk_index', i);
    fd.append('total_chunks', totalChunks);
    fd.append('filename', file.name);

    const pct = Math.round(((i + 1) / totalChunks) * 100);
    setStatus('loading',
      `<span class="spinner"></span> Lade Datei ${fileIndex + 1}/${totalFiles} hoch… ${pct}%` +
      `<div class="progress">${file.name} · Chunk ${i+1}/${totalChunks} · ${formatSize(file.size)}</div>`);

    const resp = await fetch(CHUNK_URL, {
      method: 'POST',
      headers: { 'X-API-Token': API_TOKEN },
      body: fd
    });

    if (!resp.ok) {
      const raw = await resp.text();
      let errText = raw;
      try { const j = JSON.parse(raw); errText = j.error || raw; } catch(_) {}
      throw new Error(`Upload-Fehler Chunk ${i}: ${errText.substring(0, 200)}`);
    }
  }
  return sessionId;
}

generateBtn.addEventListener('click', async () => {
  if (!selectedFiles.length) return;
  generateBtn.disabled = true;

  const totalMB = (selectedFiles.reduce((s, f) => s + f.size, 0) / 1048576).toFixed(0);
  const needsChunking = selectedFiles.some(f => f.size > CHUNK_SIZE);

  try {
    let formData = new FormData();

    if (needsChunking) {
      // --- Chunked Upload für große Dateien ---
      const sessionIds = [];
      for (let i = 0; i < selectedFiles.length; i++) {
        const sid = await uploadFileChunked(selectedFiles[i], i, selectedFiles.length);
        sessionIds.push(sid);
      }
      setStatus('loading',
        `<span class="spinner"></span> Upload abgeschlossen – Analysiere mit Claude…` +
        `<div class="progress">${selectedFiles.length} ZIP(s) · ${totalMB} MB · Bitte 3–5 Minuten warten</div>`);
      sessionIds.forEach(sid => formData.append('session_ids', sid));
    } else {
      // --- Direkter Upload für kleine Dateien (<80 MB) ---
      setStatus('loading',
        `<span class="spinner"></span> Datenraum wird analysiert…` +
        `<div class="progress">${selectedFiles.length} ZIP(s) · ${totalMB} MB · Bitte 3–5 Minuten warten</div>`);
      selectedFiles.forEach(f => formData.append('files', f, f.name));
    }

    const resp = await fetch(RENDER_URL, {
      method: 'POST',
      headers: { 'X-API-Token': API_TOKEN },
      body: formData
    });

    if (!resp.ok) {
      // Body einmal als Text lesen, dann JSON versuchen — verhindert "Body disturbed"
      const raw = await resp.text();
      let errText = raw;
      try { const j = JSON.parse(raw); errText = j.error || raw; } catch(_) {}
      throw new Error(`Fehler ${resp.status}: ${errText.substring(0, 400)}`);
    }

    const blob = await resp.blob();
    if (blob.size < 1000) {
      const text = await blob.text();
      throw new Error('Leere Antwort: ' + text.substring(0, 200));
    }

    const url = URL.createObjectURL(blob);
    setStatus('success',
      `✓ Exposé generiert! (${(blob.size/1048576).toFixed(1)} MB)<br>` +
      `<a class="download-btn" href="${url}" download="INTERPRÉS_Expose.pdf">PDF HERUNTERLADEN</a>`);

  } catch(e) {
    setStatus('error', '✗ ' + e.message);
    generateBtn.disabled = false;
  }
});
</script>
</body>
</html>
