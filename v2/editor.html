<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>INTERPRÉS – Editor</title>
<link rel="stylesheet" href="/v2/static/editor.css">
</head>
<body>

<div class="topbar">
  <div class="brand">INTERPRÉS</div>
  <div class="brand-sub">Exposé Editor</div>
  <div class="job-name" id="job-name"></div>
  <div class="typ-tabs" id="typ-tabs">
    <button class="typ-tab active" data-typ="marketing">Marketing</button>
    <button class="typ-tab" data-typ="kurz">Kurz-Exposé</button>
    <button class="typ-tab" data-typ="rechtlich">Rechtliches</button>
  </div>
  <div class="spacer"></div>
  <div class="status" id="render-status"></div>
  <button class="btn" id="btn-refresh">Vorschau aktualisieren</button>
  <button class="btn primary" id="btn-download">PDF herunterladen</button>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="side-h" id="sidebar-h">Folien</div>
    <div id="slide-list"></div>
  </aside>

  <main class="canvas">
    <div class="canvas-inner">
      <div class="slide-frame" id="slide-frame">
        <img id="slide-img" alt="">
        <div id="slide-loading" class="loading">Lade Folie …</div>
      </div>
      <div class="slide-nav">
        <button class="btn" id="btn-prev">←</button>
        <span id="slide-pos"></span>
        <button class="btn" id="btn-next">→</button>
      </div>
    </div>
  </main>

  <aside class="props">
    <div class="side-h">Bearbeiten</div>
    <div class="tabs">
      <button class="tab active" data-tab="texts">Texte</button>
      <button class="tab" data-tab="images">Bilder</button>
    </div>
    <div id="props-body" class="props-body">
      <div class="hint">Lade …</div>
    </div>
  </aside>
</div>

<script>
const JOB_ID    = window.JOB_ID;
const API_TOKEN = window.API_TOKEN || 'interpres-secret-2026';
const V2_API    = `/v2/api/job/${JOB_ID}`;
const V1_API    = `/job/${JOB_ID}`;

let job = null;
let activeIdx = 0;
let activeTab = 'texts';
let activeTyp = 'marketing';   // 'marketing' | 'kurz' | 'rechtlich'
let dirty = false;       // unsaved text changes
let pendingText = {};    // batched text updates
let saveTimer = null;
const TYP_LABEL = {marketing:'Marketing-Exposé', kurz:'Kurz-Exposé', rechtlich:'Rechtliches Exposé'};

function authHeaders(extra) {
  return Object.assign({'X-API-Token': API_TOKEN}, extra || {});
}

async function loadJob() {
  const r = await fetch(`${V2_API}?typ=${activeTyp}`);
  if (!r.ok) {
    document.body.innerHTML = '<div style="padding:40px; color:#fff;">Job nicht gefunden.</div>';
    return;
  }
  job = await r.json();
  document.getElementById('job-name').textContent = job.name || '';
  renderTypTabs();
  renderSlideList();
  if (activeIdx >= job.slide_count) activeIdx = 0;
  showSlide(activeIdx);
  renderProps();
  // Auto-Render falls noch keine Folien-JPGs fuer diesen Typ da sind und
  // das Template ueberhaupt verfuegbar ist
  const typAvailable = (job.available_typs || ['marketing']).includes(activeTyp);
  const autoKey = `_autoRender_${activeTyp}`;
  if (typAvailable && !job.slide_count && !window[autoKey]) {
    window[autoKey] = true;
    setStatus(`Erste Vorschau für ${TYP_LABEL[activeTyp]} wird erstellt …`, 'saving');
    triggerRender();
  }
}

function renderTypTabs() {
  const available = new Set(job.available_typs || ['marketing']);
  document.querySelectorAll('.typ-tab').forEach(t => {
    const typ = t.dataset.typ;
    t.classList.toggle('active', typ === activeTyp);
    if (!available.has(typ)) {
      t.classList.add('disabled');
      t.title = 'Template noch nicht hinterlegt';
    } else {
      t.classList.remove('disabled');
      t.title = '';
    }
  });
  document.getElementById('sidebar-h').textContent = `Folien · ${TYP_LABEL[activeTyp]}`;
}

async function switchTyp(typ) {
  if (typ === activeTyp) return;
  const available = new Set(job?.available_typs || ['marketing']);
  if (!available.has(typ)) {
    setStatus(`Template für „${TYP_LABEL[typ]}" noch nicht hinterlegt.`, 'error');
    return;
  }
  // Pending Text-Aenderungen vorher speichern (gehoeren zum gleichen Job)
  await flushTextChanges();
  activeTyp = typ;
  activeIdx = 0;
  setStatus(`Wechsel zu ${TYP_LABEL[typ]} …`, 'saving');
  await loadJob();
}

function renderSlideList() {
  const wrap = document.getElementById('slide-list');
  wrap.innerHTML = '';
  for (let i = 0; i < job.slide_count; i++) {
    const el = document.createElement('div');
    el.className = 'slide-item' + (i === activeIdx ? ' active' : '');
    el.innerHTML = `
      <div class="thumb-wrap">
        <img class="thumb-img" loading="lazy" src="${V1_API}/slide/${i+1}?typ=${activeTyp}&token=${encodeURIComponent(API_TOKEN)}" alt="">
      </div>
      <div class="meta">Folie ${i+1}</div>
    `;
    el.addEventListener('click', () => showSlide(i));
    wrap.appendChild(el);
  }
  if (!job.slide_count) {
    const available = new Set(job.available_typs || ['marketing']);
    if (!available.has(activeTyp)) {
      wrap.innerHTML = `<div class="hint" style="padding:20px;">Template für „${TYP_LABEL[activeTyp]}" ist noch nicht hinterlegt.<br><br>Sobald das PPTX-Template auf GitHub liegt, erscheint hier die Vorschau.</div>`;
    } else {
      wrap.innerHTML = '<div class="hint" style="padding:20px;">Keine Folien-Vorschau verfügbar.<br>Klick "Vorschau aktualisieren".</div>';
    }
  }
}

function showSlide(idx) {
  activeIdx = idx;
  renderSlideList();
  const img = document.getElementById('slide-img');
  const ld  = document.getElementById('slide-loading');
  ld.style.display = 'flex';
  img.style.opacity = '0';
  img.onload  = () => { ld.style.display = 'none'; img.style.opacity = '1'; };
  img.onerror = () => { ld.textContent = 'Folie nicht geladen'; };
  if (job.slide_count) {
    img.src = `${V1_API}/slide/${idx+1}?typ=${activeTyp}&token=${encodeURIComponent(API_TOKEN)}&t=${Date.now()}`;
  } else {
    img.removeAttribute('src');
    ld.textContent = 'Noch keine Vorschau';
  }
  document.getElementById('slide-pos').textContent = job.slide_count ? `${idx+1} / ${job.slide_count}` : '–';
  // Properties-Panel neu rendern (zeigt nur Felder dieser Folie)
  renderProps();
}

// ── Properties Panel ─────────────────────────────────────────────────────
function renderProps() {
  const body = document.getElementById('props-body');
  body.innerHTML = '';
  if (activeTab === 'texts') renderTextsTab(body);
  else renderImagesTab(body);
}

function activeSlideKeys() {
  // Set der Platzhalter-Keys die auf der aktuell gewählten Folie vorkommen.
  // Fallback bei slide_count=0 (noch kein Render): alle expose-Keys zeigen
  // damit der Editor nicht leer wirkt.
  if (!job.slide_count) {
    return new Set(Object.keys(job.expose || {}));
  }
  const arr = (job.slide_placeholders && job.slide_placeholders[activeIdx]) || [];
  return new Set(arr);
}

// Bessere Labels — wenn FIELD_GROUPS keinen Eintrag hat, generiere aus key
function labelFor(key) {
  for (const g of (job.field_groups || [])) {
    for (const [k, lbl] of g.keys) {
      if (k === key) return lbl;
    }
  }
  // Fallback: key in lesbar verwandeln
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function groupNameFor(key) {
  for (const g of (job.field_groups || [])) {
    for (const [k, _] of g.keys) {
      if (k === key) return g.name;
    }
  }
  return 'Weitere Felder';
}

function renderTextsTab(body) {
  const activeKeys = activeSlideKeys();
  // Filter: nur Keys die auf der Folie vorkommen UND nicht bild_*
  const textKeys = [...activeKeys].filter(k => !k.startsWith('bild_'));
  if (!textKeys.length) {
    body.innerHTML = '<div class="hint">Diese Folie hat keine bearbeitbaren Text-Felder.</div>';
    return;
  }
  // Sortieren + nach Gruppen organisieren
  const byGroup = {};
  for (const key of textKeys) {
    const g = groupNameFor(key);
    if (!(g in byGroup)) byGroup[g] = [];
    byGroup[g].push(key);
  }
  // Reihenfolge: bekannte Gruppen zuerst (Reihenfolge aus FIELD_GROUPS)
  const order = (job.field_groups || []).map(g => g.name).concat(['Weitere Felder']);
  for (const groupName of order) {
    const keys = byGroup[groupName];
    if (!keys || !keys.length) continue;
    const sec = document.createElement('div');
    sec.className = 'group';
    const h = document.createElement('div');
    h.className = 'group-h';
    h.textContent = groupName;
    sec.appendChild(h);
    keys.forEach(key => {
      const v = (key in job.expose) ? job.expose[key] : '';
      const f = document.createElement('div');
      f.className = 'field';
      f.innerHTML = `<label>${labelFor(key)} <span class="key-hint">${key}</span></label>`;
      const isLong = (typeof v === 'string' && v.length > 80) || /^text_/.test(key) || key.includes('beschreibung');
      const ctl = document.createElement(isLong ? 'textarea' : 'input');
      if (!isLong) ctl.type = 'text';
      else ctl.rows = Math.max(2, Math.min(8, Math.ceil((v?.length || 60) / 50)));
      ctl.value = v || '';
      ctl.addEventListener('input', e => onTextChange(key, e.target.value));
      f.appendChild(ctl);
      sec.appendChild(f);
    });
    body.appendChild(sec);
  }
}

function renderImagesTab(body) {
  // Filter: nur bild_*-Slots die auf der Folie sind
  const activeKeys = activeSlideKeys();
  const slots = (job.bild_slots || []).filter(s => activeKeys.has(s.key));
  if (!slots.length) {
    body.innerHTML = '<div class="hint">Diese Folie hat keine Bild-Slots.</div>';
    return;
  }
  // Wo kommt jeder Slot im gesamten Deck vor? (für Multi-Slot-Hinweis)
  const slotUsedOnSlides = {};
  (job.slide_placeholders || []).forEach((keys, idx) => {
    keys.forEach(k => {
      if (!k.startsWith('bild_')) return;
      if (!(k in slotUsedOnSlides)) slotUsedOnSlides[k] = [];
      slotUsedOnSlides[k].push(idx + 1);
    });
  });
  slots.forEach(slot => {
    slot.usedOn = slotUsedOnSlides[slot.key] || [];
    const f = document.createElement('div');
    f.className = 'field img-field';
    const isUploaded = slot.key in job.uploaded;
    const usedOnMulti = (slot.usedOn || []).length > 1;
    const usedHint = usedOnMulti
      ? `<span class="multi-hint" title="Dieser Slot wird auf Folien ${slot.usedOn.join(', ')} verwendet — Änderung wirkt überall.">⚠ ${slot.usedOn.length} Folien</span>`
      : '';
    f.innerHTML = `
      <label>${slot.label} ${isUploaded ? '<span class="badge">eigenes Bild</span>' : ''} ${usedHint}</label>
    `;
    // Aktuelles Bild zeigen
    const preview = document.createElement('div');
    preview.className = 'img-preview';
    if (isUploaded) {
      preview.innerHTML = `<img src="${V1_API}/uploaded/${slot.key}/preview?token=${encodeURIComponent(API_TOKEN)}&t=${Date.now()}">`;
    } else if (slot.has_url) {
      preview.innerHTML = `<img src="${slot.value}" loading="lazy">`;
    } else {
      preview.innerHTML = '<div class="img-empty">Kein Bild</div>';
    }
    f.appendChild(preview);

    // Upload-Input
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.jpg,.jpeg,.png,.webp';
    inp.addEventListener('change', e => uploadImage(slot.key, e.target.files[0]));
    f.appendChild(inp);

    if (isUploaded) {
      const del = document.createElement('button');
      del.className = 'btn small';
      del.textContent = 'Entfernen';
      del.addEventListener('click', () => removeImage(slot.key));
      f.appendChild(del);
    }
    body.appendChild(f);
  });
}

function onTextChange(key, value) {
  pendingText[key] = value;
  job.expose[key] = value;
  dirty = true;
  setStatus('●', 'saving');  // Mini-Indikator – Speichern läuft
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushTextChanges, 250);
}

async function flushTextChanges() {
  if (!Object.keys(pendingText).length) return;
  const body = pendingText;
  pendingText = {};
  try {
    const r = await fetch(`${V2_API}/text`, {
      method: 'PUT',
      headers: authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify(body),
    });
    if (r.ok) setStatus('Gespeichert ✓ · für sichtbare Änderung "Vorschau aktualisieren" klicken', 'saved');
    else setStatus('Speichern fehlgeschlagen', 'error');
  } catch(e) {
    setStatus('Netzwerkfehler beim Speichern', 'error');
  }
}

async function uploadImage(slotKey, file) {
  if (!file) return;
  const fd = new FormData();
  fd.append('image', file);
  fd.append('slot', slotKey);
  setStatus(`Bild wird hochgeladen: ${slotKey} …`, 'saving');
  try {
    const r = await fetch(`${V1_API}/upload`, {
      method: 'POST', headers: authHeaders(), body: fd,
    });
    if (!r.ok) {
      const t = await r.text();
      setStatus(`Upload-Fehler: ${t.substring(0,100)}`, 'error');
      return;
    }
    setStatus('Bild hochgeladen · klicke "Vorschau aktualisieren"', 'saved');
    // Reload state to reflect upload
    await loadJob(); renderProps();
  } catch(e) {
    setStatus('Upload-Fehler: ' + e.message, 'error');
  }
}

async function removeImage(slotKey) {
  if (!confirm(`Bild für ${slotKey} entfernen?`)) return;
  try {
    const r = await fetch(`${V1_API}/upload/${slotKey}`, {
      method: 'DELETE', headers: authHeaders(),
    });
    if (r.ok) {
      setStatus('Bild entfernt', 'saved');
      await loadJob(); renderProps();
    }
  } catch(e) {
    setStatus('Fehler: ' + e.message, 'error');
  }
}

async function triggerRender() {
  await flushTextChanges();
  setStatus(`Vorschau ${TYP_LABEL[activeTyp]} wird neu gerendert …`, 'saving');
  document.getElementById('btn-refresh').disabled = true;
  try {
    const r = await fetch(`${V2_API}/render?typ=${activeTyp}`, { method: 'POST', headers: authHeaders() });
    if (!r.ok) {
      setStatus('Render-Trigger fehlgeschlagen', 'error');
      document.getElementById('btn-refresh').disabled = false;
      return;
    }
    pollRenderStatus();
  } catch(e) {
    setStatus('Render-Fehler: ' + e.message, 'error');
    document.getElementById('btn-refresh').disabled = false;
  }
}

async function pollRenderStatus() {
  const r = await fetch(`${V2_API}/render-status`);
  const j = await r.json();
  setStatus(j.phase || j.status, j.status === 'preview' ? 'saved' : 'saving');
  if (j.status === 'preview') {
    // Reload + Folien-Cache-Bust
    await loadJob();
    showSlide(activeIdx);
    renderSlideList();
    document.getElementById('btn-refresh').disabled = false;
    setStatus('Vorschau aktualisiert ✓', 'saved');
  } else if (j.status === 'error') {
    setStatus('Render-Fehler: ' + (j.error || ''), 'error');
    document.getElementById('btn-refresh').disabled = false;
  } else {
    setTimeout(pollRenderStatus, 2000);
  }
}

async function downloadPdf() {
  await flushTextChanges();
  const url = `${V2_API}/download?typ=${activeTyp}`;
  // Triggert render falls dirty
  if (dirty) {
    if (!confirm('Vorher Vorschau aktualisieren? (empfohlen, sonst zeigt das PDF die alte Version)')) {
      window.location = url;
      return;
    }
    await triggerRender();
    return;
  }
  window.location = url;
}

function setStatus(msg, kind) {
  const el = document.getElementById('render-status');
  el.textContent = msg;
  el.className = 'status ' + (kind || '');
}

// Tabs (Texte/Bilder)
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    renderProps();
  });
});

// Typ-Tabs (Marketing/Kurz/Rechtlich)
document.querySelectorAll('.typ-tab').forEach(t => {
  t.addEventListener('click', () => switchTyp(t.dataset.typ));
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (activeIdx > 0) showSlide(activeIdx - 1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (activeIdx < job.slide_count - 1) showSlide(activeIdx + 1);
});
document.getElementById('btn-refresh').addEventListener('click', triggerRender);
document.getElementById('btn-download').addEventListener('click', downloadPdf);

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' && activeIdx > 0) showSlide(activeIdx - 1);
  if (e.key === 'ArrowRight' && activeIdx < job.slide_count - 1) showSlide(activeIdx + 1);
});

loadJob();
</script>

</body></html>
